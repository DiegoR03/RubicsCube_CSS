    <input type="radio" name="top-rotate" id="top-180" class="hidden-input">
    <input type="radio" name="top-rotate" id="top-270" class="hidden-input">
    <input type="radio" name="top-rotate" id="top-0" class="hidden-input" checked>

        <label for="top-0" class="btn b4">Draai Top (360°/Reset)</label>
